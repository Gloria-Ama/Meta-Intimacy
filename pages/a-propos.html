  <section class="naissance">
      <p class="p1">
        Meta Intimacy est une cellule dynamique du ministère international Metamorphoo, 
        implantée à Gatineau, au Canada, sous la responsabilité du Serviteur Joseph Levi Don, 
        fils spirituel du Pasteur Paul André Don.
      </p>
      <p class="p2">
        Née d’une vision portée dans le cœur de son responsable, Meta Intimacy a commencé 
        humblement avec quelques croyants, d’abord en ligne puis en présentiel. Aujourd’hui, 
        elle est devenue une véritable communauté spirituelle, un lieu d’adoration, de prière 
        et d’enseignement où des vies sont transformées et des destinées restaurées.
      </p>
      <p class="p1">
        La particularité de Meta Intimacy réside dans son identité : une cellule qui met 
        l’accent sur l’intimité avec Dieu, la communion avec le Saint-Esprit et la fraternité 
        authentique. Les jeunes qui s’y retrouvent expérimentent non seulement la présence de 
        Dieu, mais aussi une atmosphère familiale où chacun se sent accueilli et valorisé.
      </p>
      <p class="p2">
        Chaque semaine, nous vivons des temps de prières, d’enseignements, d’agapes, de brunchs, 
        de Bible Study Picnic et de Women’s Night ✨. Et ce qui rend nos rencontres uniques, 
        c’est que chaque jeudi à la fin, nous partageons un petit repas ensemble 🍽️, renforçant 
        ainsi les liens d’amitié et la fraternité entre nous.
      </p>
      <p class="p1">
        Sous la conduite du Serviteur Joseph Levi Don, Meta Intimacy s’inscrit dans la vision du 
        Pasteur Paul André Don : former une génération enracinée, persévérante et prête à manifester 
        la gloire de Dieu. Aujourd’hui, elle représente un pôle majeur de l’implantation de Metamorphoo 
        au Canada 🇨🇦, et une source d’inspiration pour les futures cellules à travers le monde.
      </p>
